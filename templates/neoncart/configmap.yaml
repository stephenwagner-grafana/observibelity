{{- if (and .Values.neoncart.enabled (le 1 (int .Values.phase))) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: neoncart-branding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: neoncart
data:
  BRANDING_NAME: {{ (.Values.neoncart.branding).name | default "NeonCart" | quote }}
  BRANDING_TAGLINE: {{ (.Values.neoncart.branding).tagline | default "Glow on. Shop on." | quote }}
  BRANDING_PRIMARY_COLOR: {{ (.Values.neoncart.branding).primaryColor | default "#22d3ee" | quote }}
{{- end }}
