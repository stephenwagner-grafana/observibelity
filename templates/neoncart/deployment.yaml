{{- if (and .Values.neoncart.enabled (le 1 (int .Values.phase))) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neoncart
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: neoncart
spec:
  replicas: {{ .Values.neoncart.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neoncart
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neoncart
      annotations:
        checksum/branding: {{ include (print $.Template.BasePath "/neoncart/configmap.yaml") . | sha256sum }}
    spec:
      {{- $podSc := include "observibelity.podSecurityContext" .Values.neoncart.securityContext }}
      {{- if $podSc }}
      securityContext:
        {{- $podSc | nindent 8 }}
      {{- end }}
      containers:
        - name: neoncart
          image: "{{ .Values.global.imageRegistry }}/observibelity-neoncart:{{ .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- $ctrSc := include "observibelity.containerSecurityContext" .Values.neoncart.securityContext }}
          {{- if $ctrSc }}
          securityContext:
            {{- $ctrSc | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: DATABASE_URL
            - name: LLM_GATEWAY_URL
              value: http://llm-gateway
            - name: OTEL_SERVICE_NAME
              value: neoncart
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=neoncart,service.namespace={{ .Values.global.namespace }},deployment.environment={{ .Values.global.deploymentEnvironment | default "demo" }}"
            - name: DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.global.deploymentEnvironment | default "demo" | quote }}
            - name: OBSERVIBELITY_NAMESPACE
              value: {{ .Values.global.namespace | quote }}
            - name: BRANDING_NAME
              valueFrom:
                configMapKeyRef:
                  name: neoncart-branding
                  key: BRANDING_NAME
            - name: BRANDING_TAGLINE
              valueFrom:
                configMapKeyRef:
                  name: neoncart-branding
                  key: BRANDING_TAGLINE
            - name: BRANDING_PRIMARY_COLOR
              valueFrom:
                configMapKeyRef:
                  name: neoncart-branding
                  key: BRANDING_PRIMARY_COLOR
            - name: GRAFANA_BASE_URL
              value: {{ .Values.neoncart.grafanaBaseUrl | default "" | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.neoncart.resources | nindent 12 }}
      terminationGracePeriodSeconds: 60
{{- end }}
