{{- if (le 1 (int .Values.phase)) }}
{{- range $tool := .Values.tools }}
{{- $name := $tool.name }}
{{- $dnsName := $name | replace "_" "-" }}
{{- $replicas := $tool.replicas | default 1 }}
{{- $tables := $tool.backing_tables | default (list) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $dnsName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" $ | nindent 4 }}
    app.kubernetes.io/component: tool
    observibelity.io/tool-name: {{ $name | quote }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: tool
      observibelity.io/tool-name: {{ $name | quote }}
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: tool
        observibelity.io/tool-name: {{ $name | quote }}
    spec:
      {{- $podSc := include "observibelity.podSecurityContext" $.Values.podDefaults.securityContext }}
      {{- if $podSc }}
      securityContext:
        {{- $podSc | nindent 8 }}
      {{- end }}
      containers:
        - name: tool
          # Image name keeps the snake_case form to match the build workflow
          # (`name: kb_search` in build-images.yml → `observibelity-kb_search`).
          # Service/Deployment names use $dnsName (hyphens) for DNS-1123 compliance.
          image: "{{ $.Values.global.imageRegistry }}/observibelity-{{ $name }}:{{ $.Values.global.imageTag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          {{- $ctrSc := include "observibelity.containerSecurityContext" $.Values.podDefaults.securityContext }}
          {{- if $ctrSc }}
          securityContext:
            {{- $ctrSc | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TOOL_NAME
              value: {{ $name | quote }}
            - name: BACKING_TABLES
              value: {{ join "," $tables | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: DATABASE_URL
            - name: OTEL_SERVICE_NAME
              value: {{ $name | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $name }},service.namespace={{ $.Values.global.namespace }},deployment.environment={{ $.Values.global.deploymentEnvironment | default "demo" }},observibelity.role=tool"
            - name: DEPLOYMENT_ENVIRONMENT
              value: {{ $.Values.global.deploymentEnvironment | default "demo" | quote }}
            - name: OBSERVIBELITY_NAMESPACE
              value: {{ $.Values.global.namespace | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          {{- if $.Values.podDefaults.enabled }}
          resources:
            {{- toYaml $.Values.podDefaults.resources | nindent 12 }}
          {{- end }}
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $dnsName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" $ | nindent 4 }}
    app.kubernetes.io/component: tool
    observibelity.io/tool-name: {{ $name | quote }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "observibelity.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: tool
    observibelity.io/tool-name: {{ $name | quote }}
{{- end }}
{{- end }}
