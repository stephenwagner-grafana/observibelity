{{- if (le 1 (int .Values.phase)) }}
{{- range $tool := .Values.tools }}
{{- $name := $tool.name }}
{{- $dnsName := $name | replace "_" "-" }}
{{- $replicas := $tool.replicas | default 1 }}
{{- $tables := $tool.backing_tables | default (list) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $dnsName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" $ | nindent 4 }}
    app.kubernetes.io/component: tool
    observibelity.io/tool-name: {{ $name | quote }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: tool
      observibelity.io/tool-name: {{ $name | quote }}
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: tool
        observibelity.io/tool-name: {{ $name | quote }}
    spec:
      {{- with $.Values.podDefaults.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: tool
          image: "{{ $.Values.global.imageRegistry }}/observibelity-{{ $dnsName }}:{{ $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TOOL_NAME
              value: {{ $name | quote }}
            - name: BACKING_TABLES
              value: {{ join "," $tables | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: DATABASE_URL
            - name: OTEL_SERVICE_NAME
              value: {{ $name | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $name }},service.namespace={{ $.Values.global.namespace }},observibelity.role=tool"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          {{- if $.Values.podDefaults.enabled }}
          resources:
            {{- toYaml $.Values.podDefaults.resources | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $dnsName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" $ | nindent 4 }}
    app.kubernetes.io/component: tool
    observibelity.io/tool-name: {{ $name | quote }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "observibelity.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: tool
    observibelity.io/tool-name: {{ $name | quote }}
{{- end }}
{{- end }}
