{{- if (and .Values.llmGateway.enabled (le 1 (int .Values.phase))) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-gateway
spec:
  replicas: {{ .Values.llmGateway.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm-gateway
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm-gateway
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/llm-gateway/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.llmGateway.securityContext | nindent 8 }}
      containers:
        - name: llm-gateway
          image: "{{ .Values.global.imageRegistry }}/observibelity-llm-gateway:{{ .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: GATEWAY_PORT
              value: "8000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-creds
                  key: ANTHROPIC_API_KEY
            - name: ANTHROPIC_ENABLED
              value: {{ .Values.llmGateway.providers.anthropic.enabled | quote }}
            - name: ANTHROPIC_DEFAULT_MODEL
              value: {{ .Values.llmGateway.providers.anthropic.model | default "claude-haiku-4-5-20251001" | quote }}
            - name: OLLAMA_ENABLED
              value: {{ .Values.llmGateway.providers.ollama.enabled | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.llmGateway.providers.ollama.baseUrl | default "" | quote }}
            - name: OTEL_SERVICE_NAME
              value: llm-gateway
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=llm-gateway,service.namespace={{ .Values.global.namespace }}"
            - name: PRICING_CONFIG_PATH
              value: /etc/llm-gateway/pricing.json
            - name: ROUTING_CONFIG_PATH
              value: /etc/llm-gateway/routing.json
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.llmGateway.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llm-gateway
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: llm-gateway-config
{{- end }}
