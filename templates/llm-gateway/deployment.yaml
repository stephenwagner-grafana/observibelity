{{- if (and .Values.llmGateway.enabled (le 1 (int .Values.phase))) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-gateway
spec:
  replicas: {{ .Values.llmGateway.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: llm-gateway
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: llm-gateway
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/llm-gateway/configmap.yaml") . | sha256sum }}
    spec:
      {{- $podSc := include "observibelity.podSecurityContext" .Values.llmGateway.securityContext }}
      {{- if $podSc }}
      securityContext:
        {{- $podSc | nindent 8 }}
      {{- end }}
      containers:
        - name: llm-gateway
          image: "{{ .Values.global.imageRegistry }}/observibelity-llm-gateway:{{ .Values.global.imageTag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- $ctrSc := include "observibelity.containerSecurityContext" .Values.llmGateway.securityContext }}
          {{- if $ctrSc }}
          securityContext:
            {{- $ctrSc | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: GATEWAY_PORT
              value: "8000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-creds
                  key: ANTHROPIC_API_KEY
            - name: ANTHROPIC_ENABLED
              value: {{ .Values.llmGateway.providers.anthropic.enabled | quote }}
            - name: ANTHROPIC_DEFAULT_MODEL
              value: {{ .Values.llmGateway.providers.anthropic.model | default "claude-haiku-4-5-20251001" | quote }}
            - name: OLLAMA_ENABLED
              value: {{ .Values.llmGateway.providers.ollama.enabled | quote }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.llmGateway.providers.ollama.baseUrl | default "" | quote }}
            - name: OLLAMA_DEFAULT_MODEL
              value: {{ .Values.llmGateway.providers.ollama.model | default "llama3.1:8b" | quote }}
            # Dynamic model-pool scheduler (see values.yaml + app/scheduler.py).
            # Replaces the old fixed-window rotation with a state machine:
            # LOADING -> ACTIVE -> DRAINING -> (unload) -> back of queue.
            # The scheduler aims for OLLAMA_POOL_MIN active models, caps at
            # OLLAMA_POOL_MAX, drains after OLLAMA_POOL_REQUESTS_PER_LIFECYCLE
            # completions, and consults a GPU sensor every
            # OLLAMA_POOL_TICK_INTERVAL_S seconds.
            - name: OLLAMA_POOL_ENABLED
              value: {{ (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).enabled | default true | quote }}
            - name: OLLAMA_POOL_MIN
              value: {{ (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).min | default 2 | quote }}
            - name: OLLAMA_POOL_MAX
              value: {{ (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).max | default 4 | quote }}
            - name: OLLAMA_POOL_REQUESTS_PER_LIFECYCLE
              value: {{ (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).requestsPerLifecycle | default 100 | quote }}
            - name: OLLAMA_POOL_SESSION_IDLE_TIMEOUT_S
              value: {{ (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).sessionIdleTimeoutS | default 600 | quote }}
            - name: OLLAMA_POOL_TICK_INTERVAL_S
              value: {{ (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).tickIntervalS | default 10 | quote }}
            - name: OLLAMA_POOL_MODELS
              value: {{ (default (list) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).models) | join "," | quote }}
            # GPU sensor — Prometheus base URL + (optional) bearer token
            # the scheduler queries for live VRAM%, GPU util%, TTFT p95.
            # On any failure the sensor returns a "hold" snapshot so the
            # scheduler stays inert on bad data.
            - name: OLLAMA_POOL_PROMETHEUS_URL
              value: {{ (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).prometheusUrl | default "" | quote }}
            {{- with (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).bearerTokenSecret }}
            - name: OLLAMA_POOL_PROMETHEUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: token
                  optional: true
            {{- end }}
            - name: OLLAMA_POOL_VRAM_TOTAL_GB
              value: {{ (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).vramTotalGb | default 32 | quote }}
            - name: OLLAMA_POOL_CAPACITY
              value: {{ (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).capacity | default 8 | quote }}
            # PromQL query overrides. Empty = use scheduler.py defaults
            # (nvidia_gpu_* from the unix-integrations exporter). Set these
            # when deploying on a DCGM-scraped fleet or with non-default
            # metric names.
            - name: OLLAMA_POOL_VRAM_QUERY
              value: {{ (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).vramQuery | default "" | quote }}
            - name: OLLAMA_POOL_UTIL_QUERY
              value: {{ (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).utilQuery | default "" | quote }}
            - name: OLLAMA_POOL_TTFT_QUERY
              value: {{ (default (dict) (default (dict) (default (dict) .Values.llmGateway.providers.ollama).pool).gpuSensor).ttftQuery | default "" | quote }}
            # keepAlive — sent on every /api/chat request AND the scheduler
            # warm-up POST when a model is loaded. Pair with the daemon's
            # OLLAMA_KEEP_ALIVE so per-request hints and daemon defaults
            # agree (parallel agent is lowering the .240 daemon to 5m).
            - name: OLLAMA_KEEP_ALIVE
              value: {{ (default (dict) .Values.llmGateway.providers.ollama).keepAlive | default "5m" | quote }}
            # Cap Ollama's per-request context window. The daemon defaults to
            # num_ctx=8192, which makes prefill ~4x slower than necessary for
            # our typical 200-1500-token inputs. 2048 covers the vast majority
            # of specialist calls (200-1500 in + up to 1500 out). Bump to 4096
            # if truncation shows up in logs.
            - name: OLLAMA_NUM_CTX
              value: {{ (default (dict) .Values.llmGateway.providers.ollama).numCtx | default 2048 | quote }}
            - name: LLM_GATEWAY_DEFAULT_PROVIDER
              value: {{ .Values.llmGateway.defaultProvider | default "anthropic" | quote }}
            # Per-call provider timeout. Default is 60s; for the .240 5090
            # fleet with sub-second response targets, 10s is generous —
            # anything slower than that is a real problem (model missing,
            # network blip), not normal latency.
            - name: LLM_GATEWAY_PROVIDER_TIMEOUT_S
              value: {{ .Values.llmGateway.providerTimeoutSeconds | default 10 | quote }}
            # Phase A: scope streaming + real TTFT to nc-chatbot. See values.yaml.
            - name: STREAM_NC_CHATBOT
              value: {{ .Values.llmGateway.streamNcChatbot | default true | quote }}
            - name: OTEL_SERVICE_NAME
              value: llm-gateway
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=llm-gateway,service.namespace={{ .Values.global.namespace }},deployment.environment={{ .Values.global.deploymentEnvironment | default "demo" }}"
            - name: DEPLOYMENT_ENVIRONMENT
              value: {{ .Values.global.deploymentEnvironment | default "demo" | quote }}
            - name: OBSERVIBELITY_NAMESPACE
              value: {{ .Values.global.namespace | quote }}
            # SupportBot email domain — drives persona_to_email() output for
            # all sb-* personas. Rebrand by changing supportbot.branding.emailDomain
            # in values.yaml; the gateway picks it up on pod restart.
            - name: SUPPORTBOT_EMAIL_DOMAIN
              value: {{ (default (dict) .Values.supportbot.branding).emailDomain | default "acme.com" | quote }}
            - name: PRICING_CONFIG_PATH
              value: /etc/llm-gateway/pricing.json
            - name: ROUTING_CONFIG_PATH
              value: /etc/llm-gateway/routing.json
            # Sigil ingest envs (all optional — the gateway's sigil.py module
            # no-ops when SIGIL_GENERATION_EXPORT_ENDPOINT is unset, so leaving
            # llmGateway.sigil.endpoint blank keeps the pod healthy with Sigil
            # export disabled).
            - name: SIGIL_GENERATION_EXPORT_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-creds
                  key: SIGIL_GENERATION_EXPORT_ENDPOINT
                  optional: true
            - name: SIGIL_PROTOCOL
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-creds
                  key: SIGIL_PROTOCOL
                  optional: true
            - name: SIGIL_BASIC_USER
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-creds
                  key: SIGIL_BASIC_USER
                  optional: true
            - name: SIGIL_BASIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-creds
                  key: SIGIL_BASIC_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.llmGateway.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/llm-gateway
              readOnly: true
      terminationGracePeriodSeconds: 60
      volumes:
        - name: config
          configMap:
            name: llm-gateway-config
{{- end }}
