{{- if (and .Values.llmGateway.enabled (le 1 (int .Values.phase))) }}
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-creds
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-gateway
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.llmGateway.providers.anthropic.apiKey | default "" | quote }}
{{- end }}
