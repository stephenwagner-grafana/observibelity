{{- if (and .Values.llmGateway.enabled (le 1 (int .Values.phase))) }}
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-creds
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-gateway
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.llmGateway.providers.anthropic.apiKey | default "" | quote }}
  # Sigil ingest credentials. The gateway only emits when
  # SIGIL_GENERATION_EXPORT_ENDPOINT is non-empty, so leaving sigil.endpoint
  # blank in values disables export without rebuilding the chart.
  SIGIL_GENERATION_EXPORT_ENDPOINT: {{ (.Values.llmGateway.sigil).endpoint | default "" | quote }}
  SIGIL_PROTOCOL: {{ (.Values.llmGateway.sigil).protocol | default "grpc" | quote }}
  SIGIL_BASIC_USER: {{ (.Values.llmGateway.sigil).basicUser | default "" | quote }}
  SIGIL_BASIC_PASSWORD: {{ (.Values.llmGateway.sigil).basicPassword | default "" | quote }}
{{- end }}
