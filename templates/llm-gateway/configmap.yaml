{{- if (and .Values.llmGateway.enabled (le 1 (int .Values.phase))) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-gateway
data:
  pricing.json: |
    {
      "claude-haiku-4-5-20251001": {
        "provider": "anthropic",
        "input_per_million_usd": 1.0,
        "output_per_million_usd": 5.0,
        "cache_read_per_million_usd": 0.1,
        "cache_write_per_million_usd": 1.25
      },
      "claude-sonnet-4-5-20250930": {
        "provider": "anthropic",
        "input_per_million_usd": 3.0,
        "output_per_million_usd": 15.0,
        "cache_read_per_million_usd": 0.3,
        "cache_write_per_million_usd": 3.75
      },
      "claude-opus-4-5-20251015": {
        "provider": "anthropic",
        "input_per_million_usd": 15.0,
        "output_per_million_usd": 75.0,
        "cache_read_per_million_usd": 1.5,
        "cache_write_per_million_usd": 18.75
      },
      "llama3.1:8b": {
        "provider": "ollama",
        "input_per_million_usd": 0.0,
        "output_per_million_usd": 0.0
      },
      "qwen2.5:7b": {
        "provider": "ollama",
        "input_per_million_usd": 0.0,
        "output_per_million_usd": 0.0
      }
    }
  routing.json: |
    {
      "default_provider": "anthropic",
      "default_model": {{ .Values.llmGateway.providers.anthropic.model | default "claude-haiku-4-5-20251001" | quote }},
      "providers": {
        "anthropic": {
          "enabled": {{ .Values.llmGateway.providers.anthropic.enabled }},
          "base_url": "https://api.anthropic.com",
          "default_model": {{ .Values.llmGateway.providers.anthropic.model | default "claude-haiku-4-5-20251001" | quote }}
        },
        "ollama": {
          "enabled": {{ .Values.llmGateway.providers.ollama.enabled }},
          "base_url": {{ .Values.llmGateway.providers.ollama.baseUrl | default "" | quote }}
        }
      }
    }
{{- end }}
