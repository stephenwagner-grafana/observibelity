  routing.json: |
    {
      "default_provider": "anthropic",
      "default_model": {{ .Values.llmGateway.providers.anthropic.model | default "claude-haiku-4-5-20251001" | quote }},
      "providers": {
        "anthropic": {
          "enabled": {{ .Values.llmGateway.providers.anthropic.enabled }},
          "base_url": "https://api.anthropic.com",
          "default_model": {{ .Values.llmGateway.providers.anthropic.model | default "claude-haiku-4-5-20251001" | quote }}
        },
        "ollama": {
          "enabled": {{ .Values.llmGateway.providers.ollama.enabled }},
          "base_url": {{ .Values.llmGateway.providers.ollama.baseUrl | default "" | quote }}
        }
      }
    }
