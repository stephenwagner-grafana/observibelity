        "cache_read_per_million_usd": 1.5,
        "cache_write_per_million_usd": 18.75,
        "note": "real Anthropic API pricing"
      },
      "llama3.1:8b": {
        "provider": "ollama",
        "input_per_million_usd": 0.12,
        "output_per_million_usd": 0.12,
        "note": "estimated GPU amortized cost on RTX 5090 (~8B params)"
      },
      "llama3.2:1b": {
        "provider": "ollama",
        "input_per_million_usd": 0.03,
