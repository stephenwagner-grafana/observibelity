  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: llm-gateway
data:
  pricing.json: |
    {
      "claude-haiku-4-5-20251001": {
        "provider": "anthropic",
        "input_per_million_usd": 0.25,
        "output_per_million_usd": 1.25,
