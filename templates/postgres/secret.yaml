{{- if (and .Values.postgres.enabled (le 1 (int .Values.phase))) }}
{{- /*
  postgres-creds Secret.
  - If .Values.postgres.password is set explicitly, use it.
  - Otherwise: look up the existing Secret in-cluster so the password is stable
    across `helm upgrade`. The Postgres data PVC outlives this Secret, so a new
    random password would orphan the database.
  - If no existing Secret is found (first install with no password supplied),
    generate a fresh random one.
*/}}
{{- $existing := (lookup "v1" "Secret" .Values.global.namespace "postgres-creds") }}
{{- $existingPw := "" }}
{{- if $existing }}
{{- $existingPw = (index $existing.data "POSTGRES_PASSWORD" | b64dec) }}
{{- end }}
{{- $password := .Values.postgres.password | default $existingPw | default (randAlphaNum 32) }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ $password | quote }}
  POSTGRES_USER: postgres
  POSTGRES_DB: observibelity
  DATABASE_URL: {{ printf "postgresql://postgres:%s@postgres:5432/observibelity" $password | quote }}
{{- end }}
