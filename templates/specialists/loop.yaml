{{- if (le 1 (int .Values.phase)) }}
{{- range $specialist := .Values.specialists }}
{{- $name := $specialist.name }}
{{- $dnsName := $name | replace "_" "-" }}
{{- $replicas := $specialist.replicas | default 1 }}
{{- $allowlist := $specialist.tool_allowlist | default (list) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $dnsName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" $ | nindent 4 }}
    app.kubernetes.io/component: specialist
    observibelity.io/specialist-name: {{ $name | quote }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: specialist
      observibelity.io/specialist-name: {{ $name | quote }}
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: specialist
        observibelity.io/specialist-name: {{ $name | quote }}
    spec:
      {{- $podSc := include "observibelity.podSecurityContext" $.Values.podDefaults.securityContext }}
      {{- if $podSc }}
      securityContext:
        {{- $podSc | nindent 8 }}
      {{- end }}
      containers:
        - name: specialist
          image: "{{ $.Values.global.imageRegistry }}/observibelity-{{ $dnsName }}:{{ $.Values.global.imageTag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          {{- $ctrSc := include "observibelity.containerSecurityContext" $.Values.podDefaults.securityContext }}
          {{- if $ctrSc }}
          securityContext:
            {{- $ctrSc | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SPECIALIST_NAME
              value: {{ $name | quote }}
            - name: TOOL_ALLOWLIST
              value: {{ join "," $allowlist | quote }}
            - name: LLM_GATEWAY_URL
              value: http://llm-gateway
            - name: OTEL_SERVICE_NAME
              value: {{ $name | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name={{ $name }},service.namespace={{ $.Values.global.namespace }},observibelity.role=specialist"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          {{- if $.Values.podDefaults.enabled }}
          resources:
            {{- toYaml $.Values.podDefaults.resources | nindent 12 }}
          {{- end }}
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $dnsName }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" $ | nindent 4 }}
    app.kubernetes.io/component: specialist
    observibelity.io/specialist-name: {{ $name | quote }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "observibelity.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: specialist
    observibelity.io/specialist-name: {{ $name | quote }}
{{- end }}
{{- end }}
