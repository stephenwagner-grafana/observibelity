{{- if (and .Values.otel.collector.enabled (le 1 (int .Values.phase))) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "observibelity.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "observibelity.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        {{- include "observibelity.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: otel-collector
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/otel-collector/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.otel.collector.securityContext | nindent 8 }}
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config=/etc/otel/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          env:
            - name: GRAFANA_CLOUD_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: otel-grafanacloud-creds
                  key: GRAFANA_CLOUD_INSTANCE_ID
            - name: GRAFANA_CLOUD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: otel-grafanacloud-creds
                  key: GRAFANA_CLOUD_API_TOKEN
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.global.namespace }},deployment.environment=observibelity"
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.otel.collector.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
            items:
              - key: config.yaml
                path: config.yaml
{{- end }}
