<div id="nc-chat" class="nc-chat" data-open="false">
  <button
    type="button"
    id="nc-chat-toggle"
    class="nc-chat__toggle"
    aria-controls="nc-chat-panel"
    aria-expanded="false"
  >
    <span class="nc-chat__toggle-icon" aria-hidden="true">&#9786;</span>
    <span class="nc-chat__toggle-text">Chat with {{ branding.name }}</span>
  </button>

  <section
    id="nc-chat-panel"
    class="nc-chat__panel"
    aria-hidden="true"
    aria-label="Chat with {{ branding.name }}"
  >
    <header class="nc-chat__header">
      <strong>{{ branding.name }} Assistant</strong>
      <button
        type="button"
        id="nc-chat-close"
        class="nc-chat__close"
        aria-label="Close chat"
      >&times;</button>
    </header>

    <div
      id="chat-messages"
      class="nc-chat__messages"
      aria-live="polite"
      aria-busy="false"
    >
      <div class="chat-msg chat-msg--bot">
        Hi! I can help you find products. Pick a suggestion below or ask
        me anything.
      </div>
    </div>

    <div
      id="nc-chat-suggestions"
      class="nc-chat__suggestions"
      aria-label="Suggested questions"
    >
      <button type="button" class="nc-chat__chip nc-chat__chip--gift" data-suggestion="find me a gift under $200 for someone who likes audio">
        🎁 gift idea under $200
      </button>
      <button type="button" class="nc-chat__chip nc-chat__chip--gift" data-suggestion="i need a birthday present for my dad, budget $150, he likes tech">
        🎂 birthday for dad
      </button>
      <button
        type="button"
        class="nc-chat__chip nc-chat__chip--gift"
        data-suggestion="gift for my 30 year old nephew, big into PC gaming, budget $300, wants a memory / RAM upgrade for his rig"
        data-usecase="cross-gen-retrieval-drift"
      >
        🎮 30yo nephew, PC gaming
      </button>
      <button type="button" class="nc-chat__chip" data-suggestion="show me keyboards">
        show me keyboards
      </button>
      <button type="button" class="nc-chat__chip" data-suggestion="recommend something for my desk">
        for my desk
      </button>
    </div>

    <form
      id="nc-chat-form"
      class="nc-chat__form"
      data-persona="{{ current_persona }}"
      data-email="{{ current_persona_email or '' }}"
      data-grafana-base-url="{{ grafana_base_url or '' }}"
    >
      <input type="hidden" name="persona_id" id="nc-chat-persona" value="{{ current_persona }}" />
      <input type="hidden" name="email" id="nc-chat-email" value="{{ current_persona_email or '' }}" />
      <input type="hidden" name="session_id" id="nc-chat-session" value="" />
      <input type="hidden" name="provider_override" value="anthropic" />
      <input type="hidden" name="traffic_origin" value="interactive" />
      <input
        type="text"
        name="message"
        id="nc-chat-input"
        placeholder="Ask about anything…"
        autocomplete="off"
        required
        minlength="1"
        maxlength="2048"
      />
      <button type="submit" class="nc-chat__send">Send</button>
      <span id="nc-chat-spinner" class="nc-chat__spinner" aria-hidden="true">
        &#8230;
      </span>
    </form>
  </section>
</div>
