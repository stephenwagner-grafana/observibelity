suite: values rendering
templates:
  - templates/namespace.yaml
tests:
  - it: renders namespace when global.namespace is set
    set:
      global.namespace: observibelity
    asserts:
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: observibelity

  - it: skips namespace when global.namespace is empty
    set:
      global.namespace: ""
    asserts:
      - hasDocuments:
          count: 0

  - it: renders namespace with a custom name when overridden
    set:
      global.namespace: my-obs
    asserts:
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: my-obs
