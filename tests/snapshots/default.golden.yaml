# Snapshot of `helm template . --release-name obs --namespace observibelity` with default values.yaml.
# CI fails if `helm template` output diverges from this file.
# To regenerate after intentional changes:
#   make snapshot
# Or:
#   helm template . --release-name obs --namespace observibelity > tests/snapshots/default.golden.yaml
---
# Source: observibelity/templates/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: observibelity
  labels:
    helm.sh/chart: observibelity-0.1.0
    app.kubernetes.io/name: observibelity
    app.kubernetes.io/instance: obs
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
---
# Source: observibelity/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "obs-observibelity-test"
  labels:
    helm.sh/chart: observibelity-0.1.0
    app.kubernetes.io/name: observibelity
    app.kubernetes.io/instance: obs
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: smoke
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          set -e
          echo "ObserVIBElity helm test running."
          echo "Phase: 0"
          if [ "0" = "0" ]; then
            echo "Phase 0: no services to test (scaffolding only). PASS."
            exit 0
          fi
          # Phase 1+: curl neoncart, llm-gateway, otel-collector
          echo "Phase 1+ tests not yet implemented."
          exit 0
