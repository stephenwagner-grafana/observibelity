# ObserVIBElity — Helm values
#
# Defaults target a generic k8s ≥1.27 cluster. Use values-docker-desktop.yaml as
# an overlay for local Docker Desktop development. Sensitive fields (passwords,
# tokens) are typically populated by install.sh at deploy time — do not commit
# real secrets here.

# Global settings shared by every component.
# namespace is created by `helm install --create-namespace`, never by a chart template
# (templates/namespace.yaml was removed because it conflicted with --create-namespace).
global:
  namespace: observibelity
  imageRegistry: ghcr.io/stephenwagner-grafana
  imagePullPolicy: IfNotPresent
  # Override the image tag used by every observibelity-* image. Empty string
  # means "fall back to .Chart.AppVersion" (the tagged-release behaviour).
  # Set to "latest" to track the rolling tag built on every push to main, or
  # pin to a specific value like "main-<sha>" for rollbacks.
  imageTag: ""
  # deployment.environment — surfaces as an OTel resource attribute on every
  # span/metric/log so the Grafana AI Observability plugin (and our custom
  # dashboards) can segment "demo" vs "production" rollouts on one stack.
  # Common values: demo (default), production, staging, dev.
  deploymentEnvironment: demo

# podDefaults — fallback values for any component that doesn't override.
# Set podDefaults.enabled=false to ship templates without resource limits / securityContext
# (useful for dev clusters with tight allocations).
podDefaults:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

# Persistent-volume settings used by Postgres and any other stateful piece.
# Leave className empty to use the cluster's default StorageClass.
storage:
  className: ""
  size: 10Gi

# Postgres for app data (NeonCart catalog/orders, etc).
# Single-replica RWO — not HA, this is a demo. Password is injected by install.sh.
postgres:
  enabled: true
  image: postgres:16-alpine
  password: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999

# LLM gateway — fan-out proxy in front of model providers.
# Toggle providers individually; Anthropic is the default for the demo.
llmGateway:
  enabled: true
  replicas: 1
  # Per-call provider timeout. 15s comfortably covers a cold-load of the
  # 30B/32B rotation models on the .240 5090 (~3-5s) plus first-response
  # latency — anything slower than that is a real problem to investigate,
  # not normal behaviour.
  providerTimeoutSeconds: 15
  providers:
    anthropic:
      enabled: true
      model: claude-haiku-4-5-20251001
      # Supplied by install.sh wizard (interactive) or values-deploy.yaml; the
      # chart writes it into the llm-gateway-creds Secret. Leave empty here.
      apiKey: ""
    ollama:
      enabled: false
      # Reachable URL for an Ollama server. Examples:
      #   in-cluster:  http://ollama.<namespace>.svc.cluster.local:11434
      #   LAN host:    http://ollama.lan.example:11434
      # Leave empty to disable. If you point at a Service in another
      # namespace, NetworkPolicy must allow the traffic.
      baseUrl: ""
      # Fallback model when rotation is disabled OR no rotation pool is
      # configured. Per-request callers can still pin a specific model via
      # ``model_override`` on the request body — that always wins.
      model: ""
      # Lockstep model rotation — every Ollama-bound specialist in the
      # cluster uses the SAME model in a 5-minute window, then they all
      # flip together. The pod-side trick is ``int(time.time()) //
      # windowSeconds``: every llm-gateway replica computes the same bucket
      # value at the same wall-clock instant, so no leader-election or
      # shared state is needed.
      #
      # Why: mimics how real teams A/B-test LLMs hour-over-hour, makes the
      # Model Winner dashboard show meaningful per-model slices, and avoids
      # OLLAMA_MAX_LOADED_MODELS thrashing on the GPU host.
      rotation:
        enabled: true
        # 5-minute window × 12 models = 60-minute cycle that aligns with
        # wall-clock hours. Each model occupies the same 5-min slot every
        # hour (00:00, 00:05, 00:10 ...), giving the Model Winner dashboard
        # clean hourly bands. Paired with OLLAMA_MAX_LOADED_MODELS=3 +
        # KEEP_ALIVE=30m on the desktop: the most-recent 3 models stay hot,
        # rotating in/out costs one cold-load (~1-4s) every 5 min.
        windowSeconds: 300
        # 12-model rotation ordered by size (1.1B → 32B) spanning 6 distinct
        # architectures (Llama, Gemma, Phi, Mistral, Qwen, Cohere) so the
        # leaderboard surfaces meaningful cost/quality variance.
        #
        # Deliberately excluded:
        #   - qwen3:4b, qwen3:30b-a3b-thinking — hybrid thinking models that
        #     emit chain-of-thought before every reply (slow + noisy).
        #   - llava:7b, qwen3-vl:30b — vision-only, not relevant to chat.
        models:
          - tinyllama:1.1b                            # 1.1B Llama
          - llama3.2:1b                               # 1.2B Llama
          - gemma2:2b                                 # 2B Gemma
          - llama3.2:latest                           # 3.2B Llama
          - phi3:mini                                 # 3.8B Phi
          - mistral:7b-instruct                       # 7B Mistral
          - qwen2.5:7b                                # 7B Qwen2
          - llama3.1:8b                               # 8B Llama
          - gemma2:9b                                 # 9B Gemma
          - phi3:medium-128k                          # 14B Phi
          - qwen2.5:14b                               # 14B Qwen2 (replaces command-r at the 14B+ slot)
          - qwen3:30b-a3b-instruct-2507-q4_K_M        # 30B Qwen3 MoE (fast — 3B active params)
          # command-r:latest deliberately excluded — 32B dense at ~86 tok/s
          # warm produced ~370 timeouts/min during its slot. qwen2.5:14b
          # takes the 12th seat instead — fast enough to sustain VU pressure.
  # Sigil — Grafana Cloud's AI Observability plugin ingest (Conversations,
  # Analytics, Tools, Evaluation views). The plugin reads from a regional
  # Sigil ingest endpoint that is DIFFERENT from the user's general OTLP
  # gateway; install.sh's wizard discovers it (typically prod-us-east-0)
  # and writes the values here. Leave endpoint blank to disable — the
  # gateway no-ops cleanly when SIGIL_GENERATION_EXPORT_ENDPOINT is unset.
  sigil:
    enabled: true
    endpoint: ""        # e.g. "sigil-prod-us-east-0.grafana.net:443"
    protocol: "grpc"
    basicUser: ""       # numeric stack id (same as otel.grafanaCloud.instanceId)
    basicPassword: ""   # Grafana Cloud token (same as otel.grafanaCloud.apiToken)
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

# NeonCart — the e-commerce frontend (Phase 1 fills this in).
# Set ingress.enabled=true and provide host/className to expose via an Ingress.
neoncart:
  enabled: true
  replicas: 1
  ingress:
    enabled: false
    host: ""
    className: ""
  # Public Grafana URL the chat widget uses to deep-link from a turn into the
  # Sigil Conversations view ("Open conversation in Sigil"). Empty disables
  # the link — set to e.g. "https://<org>.grafana.net" for cloud, or your
  # self-hosted host.
  grafanaBaseUrl: ""
  branding:
    name: "NeonCart"
    tagline: "Glow on. Shop on."
    # CSS custom property injected into base.html — drives accent on hero,
    # buttons, links, card prices. The CSS also defines a hot-magenta accent
    # baked into style.css (var --accent-color) that is NOT user-tunable;
    # change style.css directly if you want a different secondary.
    primaryColor: "#22d3ee"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

# Support Bot ("Ask Acme") — internal HR/IT support assistant.
# Phase 2+: enabled by default. Phase gate in templates/supportbot/* still
# guards rollout (phase>=2 required).
supportbot:
  enabled: true
  replicas: 1
  ingress:
    enabled: false
    host: ""
    className: ""
  branding:
    name: "Ask Acme"
    tagline: "Internal support, on tap."
    primaryColor: "#2563eb"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]

# OpenTelemetry collector + Grafana Cloud OTLP destination.
# Fill grafanaCloud.* via install.sh wizard; these are mandatory at deploy time.
# otlpEndpoint MUST be set to the user's specific Grafana Cloud region
# (e.g. https://otlp-gateway-prod-us-east-2.grafana.net/otlp). The wizard
# probes grafana.com/api/instances/<id> to discover the correct region — do
# not hardcode a sample region here, as it will silently route telemetry to
# the wrong stack and fail with 502.
otel:
  collector:
    enabled: true
    resources:
      requests: { cpu: 300m, memory: 768Mi }
      limits: { cpu: 2000m, memory: 3Gi }
    securityContext:
      runAsNonRoot: true
      runAsUser: 10001
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
  grafanaCloud:
    otlpEndpoint: ""   # required input from install.sh wizard (region-specific)
    instanceId: ""
    apiToken: ""

# k6 load tooling for staged synthetic traffic.
# Disabled in Phase 0/1 by the template phase gate; enabled in Phase 2+.
k6:
  enabled: true        # Phase 2+ defaults on; Phase 0/1 still suppressed by phase gate in templates
  image: grafana/k6:0.50.0
  replicas: 1
  resources:
    # Bumped to support 150 VUs × ~20 scenarios — the previous 500m
    # limit throttled k6 itself once we cranked VUs.
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    readOnlyRootFilesystem: false   # k6 writes temp files
    allowPrivilegeEscalation: false
    capabilities: { drop: [ALL] }
  # Continuous-traffic config — tuned to keep the .240 5090 ollama backend
  # actually working (without blowing the Anthropic budget on the 2% slice).
  cycle_seconds: 5        # 5s rest between full scenario loops (was 10/30)
  default_rate: "5m"      # default rate per scenario if not specified
  vus: 180                # virtual users per scenario — calibrated to push the
                          # 5090 toward ~80% GPU utilization without timeouts.
                          # Paired with OLLAMA_NUM_PARALLEL=8 + MAX_LOADED_MODELS=1.
  # Fraction of loadgen traffic that goes directly to Claude (Anthropic).
  # 0.03 → ~$20/day budget at vus=180, Haiku-only avg ~430 in / 60 out tokens
  # per call. Adjust here if you change vus or switch the default Claude
  # model to Sonnet (Sonnet is 3× input, 3× output the cost of Haiku).
  claudeFraction: 0.03    # ~$20/day Anthropic burn at vus=40.
                          # NOTE: Sigil eval-judge calls hit Bedrock
                          # directly — they're NOT counted here.
                          # Track via sigil_eval_judge_tokens_total.

# Observability behaviors shared across components.
# traffic_origin_default: continuous vs scenario-driven mix; never call this "loadgen".
observability:
  traffic_origin_default: continuous

# Deployment phase gate. Templates compare against this number to skip components
# that aren't ready yet (e.g. supportbot, k6, mice-rca use case).
phase: 0

# Specialists registry (auto-discovered by templates/specialists/_loop.yaml).
# Phase 1: NeonCart (nc-*). Phase 2: Support Bot (sb-*).
specialists:
  # ---- Phase 1: NeonCart -------------------------------------------------
  - name: nc-chatbot
    replicas: 1
    tool_allowlist: [search_products, get_product, get_order_history, get_inventory, place_order, add_to_cart, navigate]
  - name: nc-gift-finder
    replicas: 1
    tool_allowlist: [search_products, get_product, add_to_cart, navigate]
  - name: nc-fraud-detector
    replicas: 1
    tool_allowlist: [get_order_history, geo_lookup]
  - name: nc-fulfillment-orchestrator
    replicas: 1
    tool_allowlist: [get_inventory, place_order, geo_lookup]
  # ---- Phase 2: Support Bot ---------------------------------------------
  - name: sb-router
    replicas: 1
    tool_allowlist: []
  - name: sb-policy-finder
    replicas: 1
    tool_allowlist: [kb_search, get_employee]
  - name: sb-kb-search
    replicas: 1
    tool_allowlist: [kb_search]
  - name: sb-ticket-helper
    replicas: 1
    tool_allowlist: [list_tickets, get_ticket, create_ticket, update_ticket]
  - name: sb-employee-info
    replicas: 1
    tool_allowlist: [get_employee, get_employee_history]
  - name: sb-it-troubleshoot
    replicas: 1
    tool_allowlist: [kb_search, reset_password, request_access]
  - name: sb-hr-info
    replicas: 1
    tool_allowlist: [kb_search, get_employee]
  - name: sb-expense-helper
    replicas: 1
    tool_allowlist: [create_expense, kb_search]
  - name: sb-security-handler
    replicas: 1
    tool_allowlist: [kb_search]
  - name: sb-hiring-helper
    replicas: 1
    tool_allowlist: [kb_search]
  - name: sb-escalator
    replicas: 1
    tool_allowlist: [create_ticket]

# Tools registry (auto-discovered by templates/tools/_loop.yaml).
# Phase 1: NeonCart tools. Phase 2: Support Bot tools.
tools:
  # ---- Phase 1: NeonCart -------------------------------------------------
  - name: search_products
    replicas: 2
    backing_tables: [catalog_items, categories]
  - name: get_product
    replicas: 1
    backing_tables: [catalog_items, brands, promotions]
  - name: get_order_history
    replicas: 1
    backing_tables: [orders, order_items]
  - name: geo_lookup
    replicas: 1
    backing_tables: [ip_geo, countries]
  - name: get_inventory
    replicas: 1
    backing_tables: [catalog_items]
  - name: place_order
    replicas: 1
    backing_tables: [orders, order_items, catalog_items]
  - name: add_to_cart
    replicas: 1
    backing_tables: []
  - name: navigate
    replicas: 1
    backing_tables: []
  # ---- Phase 2: Support Bot ---------------------------------------------
  - name: kb_search
    replicas: 2
    backing_tables: [supportbot_kb]
  - name: list_tickets
    replicas: 1
    backing_tables: [tickets]
  - name: get_ticket
    replicas: 1
    backing_tables: [tickets]
  - name: create_ticket
    replicas: 1
    backing_tables: [tickets]
  - name: update_ticket
    replicas: 1
    backing_tables: [tickets]
  - name: get_employee
    replicas: 1
    backing_tables: [personas]
  - name: get_employee_history
    replicas: 1
    backing_tables: [orders, conversations]
  - name: reset_password
    replicas: 1
    backing_tables: []
  - name: request_access
    replicas: 1
    backing_tables: [tickets]
  - name: create_expense
    replicas: 1
    backing_tables: [expenses]

# Phase 2 alerting + SLO config.
# alerts: emits Prometheus alerting rules per use case under
#   registry/_generated/alerts/*.yaml. target chooses the K8s shape:
#     configmap-only       — ConfigMap with rules.yaml (default; works anywhere)
#     prometheus-operator  — PrometheusRule CRD (requires operator installed)
#     grafana-cloud        — skipped in-chart; pushed via tools/alerts-sync.sh
# slos: emits OpenSLO-flavored ConfigMaps per use case under
#   registry/_generated/slos/*.yaml. format passes through to a label
#   so downstream consumers (Pyrra, etc) can dispatch on it.
alerts:
  enabled: true
  target: configmap-only   # configmap-only | prometheus-operator | grafana-cloud
  default_route: "default-receiver"

slos:
  enabled: true
  format: openslo-v1

# Cloudflare Tunnel — optional bundled cloudflared deployer.
#
# When enabled, the chart adds a cloudflared Deployment and a ConfigMap whose
# config.yaml maps your public hostnames → in-cluster Services. This makes
# tunnel routing declarative (git-canonical) instead of hand-clicked in the
# Cloudflare dashboard. Leave disabled if you already have a tunnel running
# outside the chart (e.g. token-style cloudflared in another namespace); in
# that case configure hostnames in the Zero Trust UI and just enable the
# per-app ingresses below.
#
# One-time setup before enabling (requires `cloudflared` CLI locally):
#   cloudflared tunnel login
#   cloudflared tunnel create <name>            # prints the tunnel UUID
#   cloudflared tunnel route dns <name> neoncart.example.com
#   cloudflared tunnel route dns <name> support.example.com
#   kubectl -n observibelity create secret generic cloudflared-credentials \
#     --from-file=credentials.json=$HOME/.cloudflared/<uuid>.json
#
# Then fill in tunnelId + ingress[] below and re-run `helm upgrade`.
cloudflareTunnel:
  enabled: false
  # Tunnel UUID (the filename of credentials.json, minus .json). Required.
  tunnelId: ""
  # Secret holding credentials.json. Created out-of-band per the setup above.
  credentialsSecret: cloudflared-credentials
  replicas: 1
  image: cloudflare/cloudflared:latest
  # Hostname → in-cluster Service mapping, applied in order. The chart
  # appends a `service: http_status:404` catch-all automatically.
  ingress: []
    # - hostname: neoncart.example.com
    #   service: http://neoncart.observibelity.svc.cluster.local:80
    # - hostname: support.example.com
    #   service: http://supportbot.observibelity.svc.cluster.local:80
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 256Mi }
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
