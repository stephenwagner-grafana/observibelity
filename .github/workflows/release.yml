name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/stephenwagner-grafana/observibelity

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the tag (from push event or workflow_dispatch input) once, so every
  # downstream job sees the same value.
  # ---------------------------------------------------------------------------
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
    steps:
      - id: t
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Base images MUST be pushed first so the derived app/specialist/tool images
  # can FROM ghcr.io/.../...-base:<version>.
  # ---------------------------------------------------------------------------
  base-images:
    runs-on: ubuntu-latest
    needs: resolve
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: specialist-base
            context: src/specialists
            dockerfile: src/specialists/.Dockerfile.shared
          - name: tool-base
            context: src/tools
            dockerfile: src/tools/.Dockerfile.shared
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ needs.resolve.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
          build-args: |
            VERSION=${{ needs.resolve.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # ---------------------------------------------------------------------------
  # App + specialist + tool images. Specialists/tools FROM the base images
  # pushed in the previous job via the SPECIALIST_BASE / TOOL_BASE build-arg.
  # ---------------------------------------------------------------------------
  app-images:
    runs-on: ubuntu-latest
    needs: [resolve, base-images]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Apps ---------------------------------------------------
          - name: neoncart
            context: src/neoncart
          - name: supportbot
            context: src/supportbot
          - name: llm-gateway
            context: src/llm-gateway
          # ---- Phase 1: NeonCart specialists --------------------------
          - name: nc-chatbot
            context: src/specialists/nc-chatbot
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: nc-fraud-detector
            context: src/specialists/nc-fraud-detector
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: nc-fulfillment-orchestrator
            context: src/specialists/nc-fulfillment-orchestrator
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          # ---- Phase 2: Support Bot specialists -----------------------
          - name: sb-router
            context: src/specialists/sb-router
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-policy-finder
            context: src/specialists/sb-policy-finder
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-kb-search
            context: src/specialists/sb-kb-search
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-ticket-helper
            context: src/specialists/sb-ticket-helper
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-employee-info
            context: src/specialists/sb-employee-info
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-it-troubleshoot
            context: src/specialists/sb-it-troubleshoot
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-hr-info
            context: src/specialists/sb-hr-info
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-expense-helper
            context: src/specialists/sb-expense-helper
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-security-handler
            context: src/specialists/sb-security-handler
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-hiring-helper
            context: src/specialists/sb-hiring-helper
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          - name: sb-escalator
            context: src/specialists/sb-escalator
            build-args: |
              SPECIALIST_BASE=ghcr.io/stephenwagner-grafana/observibelity-specialist-base:${{ needs.resolve.outputs.version }}
          # ---- Phase 1: NeonCart tools --------------------------------
          - name: search_products
            context: src/tools/search_products
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: get_product
            context: src/tools/get_product
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: get_order_history
            context: src/tools/get_order_history
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: geo_lookup
            context: src/tools/geo_lookup
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: get_inventory
            context: src/tools/get_inventory
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: place_order
            context: src/tools/place_order
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          # ---- Phase 2: Support Bot tools -----------------------------
          - name: kb_search
            context: src/tools/kb_search
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: list_tickets
            context: src/tools/list_tickets
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: get_ticket
            context: src/tools/get_ticket
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: create_ticket
            context: src/tools/create_ticket
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: update_ticket
            context: src/tools/update_ticket
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: get_employee
            context: src/tools/get_employee
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: get_employee_history
            context: src/tools/get_employee_history
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: reset_password
            context: src/tools/reset_password
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: request_access
            context: src/tools/request_access
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
          - name: create_expense
            context: src/tools/create_expense
            build-args: |
              TOOL_BASE=ghcr.io/stephenwagner-grafana/observibelity-tool-base:${{ needs.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ needs.resolve.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:latest
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # ---------------------------------------------------------------------------
  # Package the Helm chart and publish the GitHub release once every image is
  # safely in the registry.
  # ---------------------------------------------------------------------------
  chart-and-release:
    runs-on: ubuntu-latest
    needs: [resolve, app-images]
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.13.3

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package . -d dist/ \
            --version "${{ needs.resolve.outputs.version }}" \
            --app-version "${{ needs.resolve.outputs.version }}"

      - name: Extract CHANGELOG entry
        run: |
          V="${{ needs.resolve.outputs.version }}"
          awk "/^## \[${V}\]/{flag=1; next} flag && /^## /{exit} flag" CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Warning: no CHANGELOG entry for ${V} — using placeholder"
            echo "Release v${V}." > release-notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ObserVIBElity ${{ needs.resolve.outputs.tag }}
          body_path: release-notes.md
          files: dist/*.tgz
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-rc') || contains(needs.resolve.outputs.tag, '-beta') }}
