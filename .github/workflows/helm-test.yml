name: helm-test
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true
jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.13.3 }
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.6.0
      - name: Run helm unittest
        run: helm unittest . -f 'tests/helm-unittest/*.yaml'
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.13.3
      - name: Render template
        run: helm template obs . --namespace observibelity > /tmp/rendered.yaml
      - name: Diff against snapshot
        # Strip only the documentation preamble (lines before the first `---`
        # YAML document separator). The rendered output never has a preamble,
        # but helm's `# Source: ...` lines and inline template comments are
        # real content and must survive the comparison.
        run: |
          strip_preamble() {
            awk 'flag || /^---$/ {flag=1; print}' "$1"
          }
          strip_preamble tests/snapshots/default.golden.yaml > /tmp/golden.body
          strip_preamble /tmp/rendered.yaml > /tmp/rendered.body
          if ! diff -u /tmp/golden.body /tmp/rendered.body; then
            echo "::error::Snapshot diff (preamble ignored). Regenerate: make snapshot"
            exit 1
          fi
