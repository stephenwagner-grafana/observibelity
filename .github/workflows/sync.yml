name: sync
on:
  push:
    branches: [main]
    paths:
      - 'dashboards/**'
      - 'registry/use_cases/**'
      - 'registry/_generated/**'
      - 'tools/dashboards-sync.sh'
      - 'tools/evaluators-sync.sh'
      - 'tools/alerts-sync.sh'
  workflow_dispatch:

concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_secrets: ${{ steps.check.outputs.has_secrets }}
    steps:
      - id: check
        env:
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
        run: |
          if [ -n "$GRAFANA_TOKEN" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GRAFANA_CLOUD_API_TOKEN not set — skipping sync jobs"
          fi

  dashboards:
    needs: preflight
    if: needs.preflight.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_TOKEN: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y jq curl
      - name: Push dashboards
        run: ./tools/dashboards-sync.sh push

  evaluators:
    needs: preflight
    if: needs.preflight.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_TOKEN: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e tools/
      - name: Compile use case YAMLs
        run: ./tools/usecase-build.sh
      - name: Push evaluators
        run: ./tools/evaluators-sync.sh push

  alerts:
    needs: preflight
    if: needs.preflight.outputs.has_secrets == 'true'
    runs-on: ubuntu-latest
    env:
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_TOKEN: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
      NAMESPACE: observibelity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e tools/
      - name: Compile use case YAMLs
        run: ./tools/usecase-build.sh
      - name: Push alerting rules to Mimir
        run: ./tools/alerts-sync.sh push
