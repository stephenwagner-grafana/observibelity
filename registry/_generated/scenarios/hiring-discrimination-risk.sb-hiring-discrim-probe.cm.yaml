apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-hiring-discrimination-risk-sb-hiring-discrim-probe
  labels:
    app.kubernetes.io/component: loadgen
    observibelity.io/use-case: hiring-discrimination-risk
    observibelity.io/scenario: sb-hiring-discrim-probe
data:
  hiring-discrimination-risk.sb-hiring-discrim-probe.js: "// k6 scenario template:\
    \ single-event-severity archetype\n// Generated for use case: hiring-discrimination-risk\n\
    // App target:           supportbot\n// Event pattern:        default\n// Severity\
    \ signal:      default\n//\n// Three streams:\n//  - critical: ~1/hr - should\
    \ fire the alert\n//  - near_miss: ~3/hr - visible, no alert\n//  - innocent:\
    \ filler so the dashboard timeline has shape\n\nimport http from 'k6/http';\n\
    import { check, sleep } from 'k6/check';\n\nexport const options = {\n  scenarios:\
    \ {\n    'hiring-discrimination-risk_critical': {\n      executor: 'constant-arrival-rate',\n\
    \      rate: 1,\n      timeUnit: '1h',\n      duration: '24h',\n      preAllocatedVUs:\
    \ 1,\n      maxVUs: 2,\n      exec: 'fireCritical',\n    },\n    'hiring-discrimination-risk_near_miss':\
    \ {\n      executor: 'constant-arrival-rate',\n      rate: 3,\n      timeUnit:\
    \ '1h',\n      duration: '24h',\n      preAllocatedVUs: 1,\n      maxVUs: 2,\n\
    \      exec: 'fireNearMiss',\n    },\n    'hiring-discrimination-risk_innocent':\
    \ {\n      executor: 'constant-arrival-rate',\n      rate: 6,\n      timeUnit:\
    \ '1m',\n      duration: '24h',\n      preAllocatedVUs: 2,\n      maxVUs: 4,\n\
    \      exec: 'fireInnocent',\n    },\n  },\n};\n\nconst BASE_URL = __ENV.TARGET_URL\
    \ || 'http://supportbot.observibelity.svc.cluster.local';\nconst INNOCENT_MESSAGES\
    \ = [\n  'how do I reset my password',\n  'what is your support hours',\n  'where\
    \ do I find my order history',\n];\n\nfunction post(message, severity, kind) {\n\
    \  const payload = JSON.stringify({\n    message: message,\n    user_id: `u-hiring-discrimination-risk-${Math.floor(Math.random()\
    \ * 100)}`,\n    session_id: `s-${Date.now()}-${Math.random().toString(36).slice(2,\
    \ 7)}`,\n    metadata: {\n      usecase: 'hiring-discrimination-risk',\n     \
    \ archetype: 'single-event-severity',\n      severity: severity,\n      kind:\
    \ kind,\n    },\n  });\n  const headers = {\n    'Content-Type': 'application/json',\n\
    \    'ai_o11y-usecase': 'hiring-discrimination-risk',\n    'ai_o11y-archetype':\
    \ 'single-event-severity',\n    'ai_o11y-severity': severity,\n    'ai_o11y-kind':\
    \ kind,\n  };\n  const res = http.post(`${BASE_URL}/chat`, payload, { headers\
    \ });\n  check(res, { 'request accepted': (r) => r.status < 500 });\n  sleep(1);\n\
    }\n\nexport function fireCritical() {\n  post('TRIGGER_CRITICAL: default', 'critical',\
    \ 'critical');\n}\n\nexport function fireNearMiss() {\n  post('TRIGGER_NEAR_MISS:\
    \ looks like default but is benign', 'low', 'near_miss');\n}\n\nexport function\
    \ fireInnocent() {\n  const msg = INNOCENT_MESSAGES[Math.floor(Math.random() *\
    \ INNOCENT_MESSAGES.length)];\n  post(msg, 'info', 'innocent');\n}"
