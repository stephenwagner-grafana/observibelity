apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-policy-circumvention-sb-policy-circumvention-probe
  labels:
    app.kubernetes.io/component: loadgen
    observibelity.io/use-case: policy-circumvention
    observibelity.io/scenario: sb-policy-circumvention-probe
data:
  policy-circumvention.sb-policy-circumvention-probe.js: "// k6 scenario template:\
    \ leaderboard archetype\n// Generated for use case: policy-circumvention\n// App\
    \ target:           supportbot\n// Rank by:              category\n// Grouped\
    \ by:           category\n//\n// Generates baseline traffic at 10/min spread across\n\
    // every category in CATEGORIES so the leaderboard always has signal.\n\nimport\
    \ http from 'k6/http';\nimport { check, sleep } from 'k6/check';\n\nexport const\
    \ options = {\n  scenarios: {\n    'policy-circumvention_leaderboard': {\n   \
    \   executor: 'constant-arrival-rate',\n      rate: 10,\n      timeUnit: '1m',\n\
    \      duration: '24h',\n      preAllocatedVUs: 4,\n      maxVUs: 12,\n      exec:\
    \ 'fire',\n    },\n  },\n};\n\nconst BASE_URL = __ENV.TARGET_URL || 'http://supportbot.observibelity.svc.cluster.local';\n\
    const CATEGORIES = [\"general\"];\n\nconst SAMPLE_MESSAGES = [\n  'summarize this\
    \ support thread',\n  'what is your return policy',\n  'help me pick a plan',\n\
    \  'i want a refund please',\n  'compare your top three skus',\n  'reset my password',\n\
    ];\n\nfunction pickCategory() {\n  return CATEGORIES[Math.floor(Math.random()\
    \ * CATEGORIES.length)];\n}\n\nfunction pickMessage() {\n  return SAMPLE_MESSAGES[Math.floor(Math.random()\
    \ * SAMPLE_MESSAGES.length)];\n}\n\nexport function fire() {\n  const category\
    \ = pickCategory();\n  const payload = JSON.stringify({\n    message: pickMessage(),\n\
    \    user_id: `customer${Math.floor(Math.random() * 50)}@acme.com`,\n    session_id:\
    \ `s-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,\n    metadata:\
    \ {\n      usecase: 'policy-circumvention',\n      archetype: 'leaderboard',\n\
    \      group_by: 'category',\n      category: category,\n    },\n  });\n  const\
    \ headers = {\n    'Content-Type': 'application/json',\n    'ai_o11y-usecase':\
    \ 'policy-circumvention',\n    'ai_o11y-archetype': 'leaderboard',\n    'ai_o11y-group-by':\
    \ 'category',\n    'ai_o11y-category': category,\n  };\n  const res = http.post(`${BASE_URL}/chat`,\
    \ payload, { headers });\n  check(res, { 'request accepted': (r) => r.status <\
    \ 500 });\n  sleep(1);\n}"
