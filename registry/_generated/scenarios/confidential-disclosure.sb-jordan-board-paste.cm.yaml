apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-confidential-disclosure-sb-jordan-board-paste
  labels:
    app.kubernetes.io/component: loadgen
    observibelity.io/use-case: confidential-disclosure
    observibelity.io/scenario: sb-jordan-board-paste
data:
  confidential-disclosure.sb-jordan-board-paste.js: "// k6 scenario template: per-user-pattern\
    \ archetype\n// Generated for use case: confidential-disclosure\n// App target:\
    \           supportbot\n// Persona:              u-jordan-finance\n// Pattern\
    \ signature:    default\n//\n// Sticky persona u-u-jordan-finance sends 1 messages,\n\
    // each matching the pattern signature. Rate is 8x baseline\n// so the persona\
    \ surfaces on the leaderboard.\n\nimport http from 'k6/http';\nimport { check,\
    \ sleep } from 'k6/check';\n\nexport const options = {\n  scenarios: {\n    'confidential-disclosure_offender':\
    \ {\n      executor: 'constant-arrival-rate',\n      rate: 8,\n      timeUnit:\
    \ '1m',\n      duration: '24h',\n      preAllocatedVUs: 2,\n      maxVUs: 4,\n\
    \      exec: 'fireOffender',\n    },\n    'confidential-disclosure_baseline':\
    \ {\n      executor: 'constant-arrival-rate',\n      rate: 1,\n      timeUnit:\
    \ '1m',\n      duration: '24h',\n      preAllocatedVUs: 4,\n      maxVUs: 8,\n\
    \      exec: 'fireBaseline',\n    },\n  },\n};\n\nconst BASE_URL = __ENV.TARGET_URL\
    \ || 'http://supportbot.observibelity.svc.cluster.local';\nconst PATTERN_MESSAGES\
    \ = [\n  'help me with my order please',\n];\nconst BASELINE_PERSONAS = ['u-base-a',\
    \ 'u-base-b', 'u-base-c', 'u-base-d'];\n\nexport function fireOffender() {\n \
    \ const msg = PATTERN_MESSAGES[Math.floor(Math.random() * PATTERN_MESSAGES.length)];\n\
    \  const payload = JSON.stringify({\n    message: msg,\n    user_id: 'u-jordan-finance',\n\
    \    session_id: `s-u-jordan-finance-${Date.now()}`,\n    metadata: {\n      usecase:\
    \ 'confidential-disclosure',\n      archetype: 'per-user-pattern',\n      pattern_signature:\
    \ 'default',\n    },\n  });\n  const headers = {\n    'Content-Type': 'application/json',\n\
    \    'ai_o11y-usecase': 'confidential-disclosure',\n    'ai_o11y-archetype': 'per-user-pattern',\n\
    \    'ai_o11y-persona': 'u-jordan-finance',\n  };\n  const res = http.post(`${BASE_URL}/chat`,\
    \ payload, { headers });\n  check(res, { 'request accepted': (r) => r.status <\
    \ 500 });\n  sleep(1);\n}\n\nexport function fireBaseline() {\n  const persona\
    \ = BASELINE_PERSONAS[Math.floor(Math.random() * BASELINE_PERSONAS.length)];\n\
    \  const payload = JSON.stringify({\n    message: 'help me with my order please',\n\
    \    user_id: persona,\n    session_id: `s-${persona}-${Date.now()}`,\n    metadata:\
    \ { usecase: 'confidential-disclosure', archetype: 'per-user-pattern' },\n  });\n\
    \  const headers = {\n    'Content-Type': 'application/json',\n    'ai_o11y-usecase':\
    \ 'confidential-disclosure',\n    'ai_o11y-archetype': 'per-user-pattern',\n \
    \   'ai_o11y-persona': persona,\n  };\n  http.post(`${BASE_URL}/chat`, payload,\
    \ { headers });\n  sleep(1);\n}"
