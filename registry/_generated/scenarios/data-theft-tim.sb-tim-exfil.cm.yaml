apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-data-theft-tim-sb-tim-exfil
  labels:
    app.kubernetes.io/component: loadgen
    observibelity.io/use-case: data-theft-tim
    observibelity.io/scenario: sb-tim-exfil
data:
  data-theft-tim.sb-tim-exfil.js: "// k6 scenario template: per-user-pattern archetype\n\
    // Generated for use case: data-theft-tim\n// App target:           supportbot\n\
    // Persona:              tim.lewis@acme.com\n// Pattern signature:    default\n//\n// Sticky\
    \ persona tim.lewis@acme.com sends 1 messages,\n// each matching the pattern signature.\
    \ Rate is 8x baseline\n// so the persona surfaces on the leaderboard.\n\nimport\
    \ http from 'k6/http';\nimport { check, sleep } from 'k6/check';\n\nexport const\
    \ options = {\n  scenarios: {\n    'data-theft-tim_offender': {\n      executor:\
    \ 'constant-arrival-rate',\n      rate: 8,\n      timeUnit: '1m',\n      duration:\
    \ '24h',\n      preAllocatedVUs: 2,\n      maxVUs: 4,\n      exec: 'fireOffender',\n\
    \    },\n    'data-theft-tim_baseline': {\n      executor: 'constant-arrival-rate',\n\
    \      rate: 1,\n      timeUnit: '1m',\n      duration: '24h',\n      preAllocatedVUs:\
    \ 4,\n      maxVUs: 8,\n      exec: 'fireBaseline',\n    },\n  },\n};\n\nconst\
    \ BASE_URL = __ENV.TARGET_URL || 'http://supportbot.observibelity.svc.cluster.local';\n\
    const PATTERN_MESSAGES = [\n  'help me with my order please',\n];\nconst BASELINE_PERSONAS\
    \ = ['base.a@acme.com', 'base.b@acme.com', 'base.c@acme.com', 'base.d@acme.com'];\n\nexport function fireOffender()\
    \ {\n  const msg = PATTERN_MESSAGES[Math.floor(Math.random() * PATTERN_MESSAGES.length)];\n\
    \  const payload = JSON.stringify({\n    message: msg,\n    user_id: 'tim.lewis@acme.com',\n\
    \    session_id: `s-tim.lewis-${Date.now()}`,\n    metadata: {\n      usecase: 'data-theft-tim',\n\
    \      archetype: 'per-user-pattern',\n      pattern_signature: 'default',\n \
    \   },\n  });\n  const headers = {\n    'Content-Type': 'application/json',\n\
    \    'ai_o11y-usecase': 'data-theft-tim',\n    'ai_o11y-archetype': 'per-user-pattern',\n\
    \    'ai_o11y-persona': 'tim.lewis@acme.com',\n  };\n  const res = http.post(`${BASE_URL}/chat`,\
    \ payload, { headers });\n  check(res, { 'request accepted': (r) => r.status <\
    \ 500 });\n  sleep(1);\n}\n\nexport function fireBaseline() {\n  const persona\
    \ = BASELINE_PERSONAS[Math.floor(Math.random() * BASELINE_PERSONAS.length)];\n\
    \  const payload = JSON.stringify({\n    message: 'help me with my order please',\n\
    \    user_id: persona,\n    session_id: `s-${persona}-${Date.now()}`,\n    metadata:\
    \ { usecase: 'data-theft-tim', archetype: 'per-user-pattern' },\n  });\n  const\
    \ headers = {\n    'Content-Type': 'application/json',\n    'ai_o11y-usecase':\
    \ 'data-theft-tim',\n    'ai_o11y-archetype': 'per-user-pattern',\n    'ai_o11y-persona':\
    \ persona,\n  };\n  http.post(`${BASE_URL}/chat`, payload, { headers });\n  sleep(1);\n\
    }"
