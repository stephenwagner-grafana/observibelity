apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-mice-rca-nc-show-me-mice
  labels:
    app.kubernetes.io/component: loadgen
    observibelity.io/use-case: mice-rca
    observibelity.io/scenario: nc-show-me-mice
data:
  mice-rca.nc-show-me-mice.js: "// k6 scenario template: trace-and-fix archetype\n\
    // Generated for use case: {{ name }}\n// App target:           {{ app }}\n//\
    \ Trace filter:         {{ trace_filter }}\n// Trigger phrase:        {{ trigger_phrase\
    \ }}\n//\n// Rate: ~1 request per minute. Goal is one trace per minute that produces\n\
    // the structured error span identified by `trace_filter`. The compiler\n// substitutes\
    \ Jinja variables and writes the final scenario to\n// loadgen/scenarios/{{ name\
    \ }}.js.\n\nimport http from 'k6/http';\nimport { check, sleep } from 'k6/check';\n\
    \nexport const options = {\n  scenarios: {\n    {{ name }}_trace_and_fix: {\n\
    \      executor: 'constant-arrival-rate',\n      rate: 1,\n      timeUnit: '1m',\n\
    \      duration: '24h',\n      preAllocatedVUs: 1,\n      maxVUs: 2,\n      exec:\
    \ 'fire',\n    },\n  },\n  thresholds: {\n    // We expect the error - don't fail\
    \ the scenario on 5xx.\n    http_req_failed: ['rate<1.0'],\n  },\n};\n\nconst\
    \ BASE_URL = __ENV.TARGET_URL || 'http://{{ app }}.observibelity.svc.cluster.local';\n\
    \nexport function fire() {\n  const payload = JSON.stringify({\n    message: '{{\
    \ trigger_phrase }}',\n    user_id: 'u-trace-fix-{{ name }}',\n    session_id:\
    \ `s-${Date.now()}`,\n    metadata: {\n      usecase: '{{ name }}',\n      archetype:\
    \ 'trace-and-fix',\n    },\n  });\n\n  const headers = {\n    'Content-Type':\
    \ 'application/json',\n    'ai_o11y-usecase': '{{ name }}',\n    'ai_o11y-archetype':\
    \ 'trace-and-fix',\n    'ai_o11y-trace-filter': '{{ trace_filter }}',\n    'X-Trigger-Phrase':\
    \ '{{ trigger_phrase }}',\n  };\n\n  const res = http.post(`${BASE_URL}/chat`,\
    \ payload, { headers });\n\n  check(res, {\n    'trace span emitted': (r) => r.headers['X-Trace-Id']\
    \ !== undefined,\n  });\n\n  sleep(1);\n}\n"
