apiVersion: v1
kind: ConfigMap
metadata:
  name: loadgen-hallucination-product-price-nc-hallucination-probe
  labels:
    app.kubernetes.io/component: loadgen
    observibelity.io/use-case: hallucination-product-price
    observibelity.io/scenario: nc-hallucination-probe
data:
  hallucination-product-price.nc-hallucination-probe.js: "// k6 scenario template:\
    \ leaderboard archetype\n// Generated for use case: hallucination-product-price\n\
    // App target:           neoncart\n// Rank by:              category\n// Grouped\
    \ by:           category\n//\n// Generates baseline traffic at 10/min spread across\n\
    // every category in CATEGORIES so the leaderboard always has signal.\n\nimport\
    \ http from 'k6/http';\nimport { check, sleep } from 'k6/check';\n\nexport const\
    \ options = {\n  scenarios: {\n    'hallucination-product-price_leaderboard':\
    \ {\n      executor: 'constant-arrival-rate',\n      rate: 10,\n      timeUnit:\
    \ '1m',\n      duration: '24h',\n      preAllocatedVUs: 4,\n      maxVUs: 12,\n\
    \      exec: 'fire',\n    },\n  },\n};\n\nconst BASE_URL = __ENV.TARGET_URL ||\
    \ 'http://neoncart.observibelity.svc.cluster.local';\nconst CATEGORIES = [\"general\"\
    ];\n\nconst SAMPLE_MESSAGES = [\n  'summarize this support thread',\n  'what is\
    \ your return policy',\n  'help me pick a plan',\n  'i want a refund please',\n\
    \  'compare your top three skus',\n  'reset my password',\n];\n\nfunction pickCategory()\
    \ {\n  return CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];\n}\n\n\
    function pickMessage() {\n  return SAMPLE_MESSAGES[Math.floor(Math.random() *\
    \ SAMPLE_MESSAGES.length)];\n}\n\nexport function fire() {\n  const category =\
    \ pickCategory();\n  const payload = JSON.stringify({\n    message: pickMessage(),\n\
    \    user_id: `u-leaderboard-${Math.floor(Math.random() * 50)}`,\n    session_id:\
    \ `s-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,\n    metadata:\
    \ {\n      usecase: 'hallucination-product-price',\n      archetype: 'leaderboard',\n\
    \      group_by: 'category',\n      category: category,\n    },\n  });\n  const\
    \ headers = {\n    'Content-Type': 'application/json',\n    'ai_o11y-usecase':\
    \ 'hallucination-product-price',\n    'ai_o11y-archetype': 'leaderboard',\n  \
    \  'ai_o11y-group-by': 'category',\n    'ai_o11y-category': category,\n  };\n\
    \  const res = http.post(`${BASE_URL}/chat`, payload, { headers });\n  check(res,\
    \ { 'request accepted': (r) => r.status < 500 });\n  sleep(1);\n}"
