groups:
- name: model-winner
  rules:
  - alert: model_winner.atc_rate_collapse
    expr: "sum by (model) (\n  rate(\n    {service_namespace=\"observibelity\",container=\"\
      tool\"}\n      |~ \"atc_event\"\n      | pattern `<_>atc_event source=<source>\
      \ product_id=<pid> sku=<sku> qty=<qty> agent_name=<agent> model=<model> <_>`\n\
      \      [15m]\n  )\n) < 0.001\n"
    for: 10m
    labels:
      severity: medium
      use_case: model-winner
      app: neoncart
      route: oncall@acme.local
    annotations:
      summary: "Model Winner \u2014 rank by ATC, not eval scores: model_winner.atc_rate_collapse\
        \ firing"
      description: Customer types "I'm shopping for my 10-year-old nephew, budget
        $50" in the
      runbook: registry/use_cases/model-winner.yaml
