groups:
- name: brand-voice-drift
  rules:
  - alert: ai-o11y-brand-drift
    expr: "(\n  avg_over_time(\n    (sum(rate(sigil_eval_scores_total{evaluator=\"\
      brand_voice_drift.tone_deviation\"}[5m]))\n     / sum(rate(sigil_eval_executions_total{evaluator=\"\
      brand_voice_drift.tone_deviation\"}[5m])))[30m:5m]\n  )\n  <\n  avg_over_time(\n\
      \    (sum(rate(sigil_eval_scores_total{evaluator=\"brand_voice_drift.tone_deviation\"\
      }[5m]))\n     / sum(rate(sigil_eval_executions_total{evaluator=\"brand_voice_drift.tone_deviation\"\
      }[5m])))[6h:5m]\n  ) - 0.20\n)\n"
    for: 15m
    labels:
      severity: medium
      use_case: brand-voice-drift
      app: neoncart
      route: brand@acme.local
    annotations:
      summary: "Brand Voice Drift \u2014 tone as SLO: ai-o11y-brand-drift firing"
      description: The tone-checker specialist scores every assistant response against
        the
      runbook: registry/use_cases/brand-voice-drift.yaml
