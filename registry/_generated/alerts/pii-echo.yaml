groups:
- name: pii-echo
  rules:
  - alert: ai-o11y-pii-echo
    expr: 'sum(rate(sigil_eval_scores_total{evaluator="base.pii_in_output",passed="false"}[1m]))
      > 0

      '
    for: 0s
    labels:
      severity: critical
      use_case: pii-echo
      app: both
      route: security@acme.local
    annotations:
      summary: "PII Echo \u2014 single-event severity P0: ai-o11y-pii-echo firing"
      description: The bot repeats user-supplied PII (credit card, SSN) back in plain
        text.
      runbook: registry/use_cases/pii-echo.yaml
