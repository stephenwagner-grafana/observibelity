groups:
- name: refund-policy-compliance
  rules:
  - alert: refund_policy_compliance.window_violation_rate
    expr: "sum(rate(sigil_eval_scores_total{evaluator=\"refund_policy_compliance.window_violation\"\
      ,passed=\"false\"}[15m]))\n  / sum(rate(sigil_eval_scores_total{evaluator=\"\
      refund_policy_compliance.window_violation\"}[15m])) > 0.02\n"
    for: 10m
    labels:
      severity: high
      use_case: refund-policy-compliance
      app: neoncart
      route: oncall@acme.local
    annotations:
      summary: "Refund Policy Compliance \u2014 every refund audited: refund_policy_compliance.window_violation_rate\
        \ firing"
      description: The bot occasionally offers refunds outside of policy (e.g. a 90-day-old
      runbook: registry/use_cases/refund-policy-compliance.yaml
