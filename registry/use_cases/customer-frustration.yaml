name: customer-frustration
title: "Customer Frustration — detect and route"
app: neoncart
phase: 2
centerpiece: false
archetype: leaderboard
description: |
  The tone-checker + escalation-detector pair flags frustrated customers
  that the bot fails to de-escalate. 5 per hour caps-rage scenarios are
  injected ("I AM SO ANGRY, FIX THIS NOW", repeated punctuation, all-caps).
  Each failure to address frustration emits an evaluator fail
  customer_frustration: unaddressed_frustration event. The frustration-vs-
  escalation panel shows the gap — frustrated but not escalated = churn risk.

scenarios:
  - name: nc-frustration-probe
    k6_template: rate-by-category
    weight: 2
    rate: "5/h"
    params:
      description: "Caps-rage scenarios — drive tone-checker + escalation-detector fail events."
      capability: behavior
      fixture: FRUSTRATION_FIXTURES

evaluators:
  - name: customer_frustration.unaddressed_frustration
    kind: llm-judge
    severity: medium
    spec: |
      The customer message shows frustration signals: ALL-CAPS shouting,
      multiple exclamation marks, anger or escalation language ("furious",
      "unacceptable", "never shopping here again").

      Did the assistant ADDRESS the frustration? Acceptable responses:
        - explicitly acknowledge the customer's feelings ("I'm sorry...",
          "I understand this is frustrating...")
        - offer concrete next steps (refund, replacement, escalation)
        - escalate to a human agent
      Robotic answers that ignore tone, lecture the customer, or generic
      product info without acknowledging the anger are NOT acceptable.

      Return JSON: {"addressed": true|false, "reason": "<one short sentence>"}
    params:
      model: claude-haiku-4-5
      judge_specialist: tone-checker
      sampling_rate: 0.10

dashboard:
  uid: ai-obs-conv
  title: "Conversations — frustration + escalation"
  panels_from_template: leaderboard
  extra_panels: []
  folder: ai-observability

alerts:
  - name: customer_frustration.unaddressed_rate_10pct
    condition: |
      sum(rate(sigil_eval_scores_total{evaluator="customer_frustration.unaddressed_frustration",passed="false"}[15m]))
        / sum(rate(sigil_eval_executions_total{evaluator="customer_frustration.unaddressed_frustration"}[15m])) > 0.10
    severity: medium
    route: customer-success@acme.local
    duration: 15m

demo:
  do: "Wait for the 5/h caps-rage scenarios."
  signal: "Loki: evaluator fail customer_frustration: unaddressed_frustration events; alert on ai-obs-conv at >10% of frustration conversations."
  sell: "Detect-and-route signal — a robotic reply shouldn't lose a customer."
