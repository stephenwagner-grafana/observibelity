name: brand-voice-drift
title: "Brand Voice Drift — tone as SLO"
app: neoncart
phase: 2
centerpiece: false
archetype: leaderboard
description: |
  The tone-checker specialist scores every assistant response against the
  brand-voice rubric (warmth, playfulness, NeonCart-specific phrases).
  4 per hour dry-tone-prone prompts are injected ("provide a formal
  itemized breakdown"). The rolling 30-minute tone deviation is compared
  against the 6-hour baseline; >2 sigma drift fires the brand-drift alert
  before customers notice. Brand voice becomes an SLO, not a vibes check.

scenarios:
  - name: nc-brand-voice-probe
    k6_template: rate-by-category
    weight: 2
    rate: "4/h"
    params:
      description: "Dry-tone-prone prompts — drive tone-checker deviation from baseline."
      capability: behavior
      fixture: DRY_TONE_FIXTURES

evaluators:
  - name: brand_voice_drift.tone_deviation
    kind: llm-judge
    severity: medium
    spec: |
      Score the assistant response 0-100 for adherence to the NeonCart
      brand voice: warm, playful, concise, modern-retail. NOT dry, NOT
      corporate-stilted, NOT robotic.

      Anchors:
        0   = robotic / scripted / no personality
        25  = corporate-stilted ("Per your inquiry...")
        50  = neutral / acceptable
        75  = on-brand: warm + helpful + concise
        100 = perfectly on-brand: NeonCart's voice with a touch of playfulness

      Return JSON: {"score": <0-100 integer>, "reason": "<one short sentence>"}
    params:
      model: claude-haiku-4-5
      judge_specialist: tone-checker
      sampling_rate: 0.10

dashboard:
  uid: ai-obs-conv
  title: "Conversations — brand voice drift"
  panels_from_template: leaderboard
  extra_panels: []
  folder: ai-observability

alerts:
  # Wired to Sigil brand_voice_drift.tone_deviation (scored 0-100, Sigil
  # normalizes to 0-1). Fires if the 30m avg drops 0.2 below the 6h baseline.
  - name: ai-o11y-brand-drift
    condition: |
      (
        avg_over_time(
          (sum(rate(sigil_eval_scores_total{evaluator="brand_voice_drift.tone_deviation"}[5m]))
           / sum(rate(sigil_eval_executions_total{evaluator="brand_voice_drift.tone_deviation"}[5m])))[30m:5m]
        )
        <
        avg_over_time(
          (sum(rate(sigil_eval_scores_total{evaluator="brand_voice_drift.tone_deviation"}[5m]))
           / sum(rate(sigil_eval_executions_total{evaluator="brand_voice_drift.tone_deviation"}[5m])))[6h:5m]
        ) - 0.20
      )
    severity: medium
    route: brand@acme.local
    duration: 15m

demo:
  do: "Wait for the 4/h dry-tone-prone prompts."
  signal: "Rolling tone-deviation >2 sigma from 6h baseline; ai-o11y-brand-drift FIRES on ai-obs-conv."
  sell: "Brand voice as an SLO — watch the trend, not the snapshot."
